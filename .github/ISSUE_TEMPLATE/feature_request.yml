name: Feature request
description: Suggest an improvement for OBS Recording Monitor
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea.
        A focused request makes it much easier to evaluate and implement.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      placeholder: I want to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to happen?
      placeholder: It would help if...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: I tried...
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Mockups, examples, and use cases are welcome.
    validations:
      required: false
